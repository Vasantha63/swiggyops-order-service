global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'swiggyops-monitor'

scrape_configs:
  - job_name: 'order-service'
    static_configs:
      - targets: ['order-service:8003']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']