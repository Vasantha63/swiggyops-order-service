# SwiggyOps Order Service Helm Values

replicaCount: 2

image:
  repository: 654654435115.dkr.ecr.ap-south-1.amazonaws.com/swiggyops-order-service
  tag: latest
  pullPolicy: Always

service:
  type: LoadBalancer
  port: 80
  targetPort: 8003

resources:
  requests:
    memory: "64Mi"
    cpu: "250m"
  limits:
    memory: "128Mi"
    cpu: "500m"

env:
  APP_ENV: production
  PORT: "8003"

probes:
  liveness:
    path: /health
    port: 8003
    initialDelaySeconds: 30
    periodSeconds: 10
  readiness:
    path: /health
    port: 8003
    initialDelaySeconds: 5
    periodSeconds: 5

monitoring:
  enabled: true
  prometheus:
    scrape: true
    port: 8003
    path: /metrics

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80